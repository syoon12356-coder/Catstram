<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catstram</title>
    <link rel="shortcut icon" type="image/png" href="ico.png" sizes="64x64" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="/font.css" />
    <link rel="stylesheet" href="./Login.css" />
  </head>
  <body>
    <header>
      <div class="center">
        <div class="ico-area">
          <img
            src="/images/favicon.png"
            width="120"
            class="animate__animated animate__heartBeat animate__infinite"
          />
        </div>
        <div class="logo-area">
          <img src="/images/logo.png" width="430" />
        </div>
        <div style="color: rgb(102, 102, 102); margin-top: -60px">
          주변의 고양이를 찾고 자랑하세요
        </div>
        <div class="tab">
          <button id="btn-login" class="active" onclick="showLogin()">
            로그인
          </button>
          <button id="btn-signup" onclick="showSignup()">회원가입</button>
        </div>

        <div id="login-form">
          <p>아이디</p>
          <input type="text" id="login-id" placeholder="아이디를 입력하세요" />
          <p>비밀번호</p>
          <input
            type="password"
            id="login-pw"
            placeholder="비밀번호를 입력하세요"
          />
          <div class="btn">
            <button id="submit-login" onclick="handleLogin()">로그인</button>
          </div>
        </div>

        <div id="signup-form" style="display: none">
          <p>이름</p>
          <input type="text" id="signup-name" placeholder="이름을 입력하세요" />
          <p>아이디</p>
          <input type="text" id="signup-id" placeholder="아이디를 입력하세요" />
          <p>전화번호</p>
          <input type="tel" id="signup-tel" placeholder="010-0000-0000" />
          <p>비밀번호</p>
          <input
            type="password"
            id="signup-pw"
            placeholder="비밀번호를 입력하세요"
          />
          <div class="btn">
            <button id="submit-signup" onclick="handleSignup()">
              회원가입
            </button>
          </div>
        </div>
      </div>
    </header>
    <script src="./Login.js"></script>
  </body>
</html>
