<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catstram_Upload</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/Upload/Upload.css" />
    <link rel="stylesheet" href="/font.css" />
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="icon"
      href="/images/favicon.png"
      type="image/png"
      sizes="180x180"
    />
  </head>
  <body>
    <div class="web-container">
      <header class="page-header">
        <div class="header-title">새 게시물 작성</div>
      </header>

      <main>
        <div class="section">
          <div class="section-header">
            <span class="section-title">사진 추가</span>
            <span class="section-desc"
              ><span id="photo-count">0</span> / 5장</span
            >
          </div>
          <div class="section-desc" style="margin-bottom: 12px">
            최대 5장까지 선택할 수 있어요.
          </div>

          <div class="photo-gallery">
            <input
              type="file"
              id="file-input"
              accept="image/*"
              multiple
              style="display: none"
            />
            <label for="file-input" class="btn-add-photo">
              <span style="font-size: 28px; margin-bottom: 4px">+</span>
              사진 선택
            </label>

            <div id="preview-container" style="display: contents"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title" style="margin-bottom: 12px">캡션</div>
          <div class="caption-box">
            <textarea
              id="caption-input"
              placeholder="고양이에 대한 이야기를 들려주세요..."
              maxlength="300"
            ></textarea>
            <div class="char-counter" id="char-counter">0/300</div>
          </div>
        </div>

        <div class="section tag-wrapper">
          <div class="section-title" style="margin-bottom: 12px">태그</div>
          <div class="tag-input-box">
            <input
              type="text"
              id="tag-input"
              placeholder="# 태그를 입력하세요 (엔터로 추가)"
            />
          </div>

          <div class="autocomplete" id="autocomplete">
            <div class="auto-item">#길냥이</div>
            <div class="auto-item">#고양이</div>
            <div class="auto-item">#냥스타그램</div>
          </div>

          <div class="tag-list" id="tag-list"></div>
        </div>

        <div class="bottom-wrapper">
          <button class="btn-location" id="btn-location">
            <span style="font-size: 18px">📍</span>
            <span id="location-text">현재 위치 추가</span>
          </button>

          <div class="action-buttons">
            <button class="btn-cancel" id="btn-cancel">취소</button>
            <button class="btn-submit" id="btn-submit" disabled>
              게시하기
            </button>
          </div>
        </div>
      </main>

      <div class="modal-overlay" id="modal-cancel">
        <div class="modal-content">
          <div class="modal-title">게시를 취소하시겠습니까?</div>
          <div class="modal-buttons">
            <button class="btn-modal-close" id="btn-modal-close">
              작성 계속
            </button>
            <button class="btn-modal-confirm" id="btn-modal-confirm">
              취소하기
            </button>
          </div>
        </div>
      </div>

      <div
        class="modal-overlay"
        id="modal-loading"
        style="background: rgba(0, 0, 0, 0.8)"
      >
        <div style="text-align: center">
          <div class="spinner"></div>
          <div class="loading-text">게시물을 업로드하고 있습니다...</div>
        </div>
      </div>
    </div>
    <script src="/bottomnav.js"></script>
    <script src="/Upload/Upload.js"></script>
  </body>
</html>
